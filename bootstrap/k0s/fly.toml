app = "k0s-cluster"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  K0S_ROLE = "server"
  AUTOSCALER_HIGH_WATERMARK = "80"
  AUTOSCALER_LOW_WATERMARK = "30"
  AUTOSCALER_MAX_AGENTS = "4"
  AUTOSCALER_COOLDOWN_SECONDS = "120"
  AUTOSCALER_CHECK_INTERVAL = "30"
  AUTOSCALER_AGENT_VM_SIZE = "shared-cpu-2x"
  AUTOSCALER_AGENT_MEMORY_MB = "2048"

[[mounts]]
  source = "k0s_data"
  destination = "/var/lib/k0s"
  initial_size = "10gb"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"